name: Publish to WinGet
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version or tag to publish"
        required: true
      identifier:
        description: "WinGet package identifier"
        required: true
        default: "Nyro.Nyro"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@2
        with:
          identifier: ${{ inputs.identifier }}
          version: ${{ inputs.version }}
          token: ${{ secrets.WINGET_TOKEN }}
